<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안녕하시구리</title>
    <style>
        body {
            background-color: #eeeeee62;
        }
        div {
            margin: 10px;
        }
        #container {
            margin: 20px auto;
            width: 600px;
            height: 800px;
            border: 1px solid #fff;
            /* background-color: white; */
            /* background-image: url(tom1.jpg); */
            box-shadow: 10px 10px 11px #eee;
            border-radius: 5%;
            box-sizing: border-box;
            text-align: center;
            padding: 20px;
            /* font-size: x-large; */
        }
        #pro {
            /* box-shadow: 10px 10px 11px #eee; */
            box-sizing: border-box; 
            width: 215px;
            height: 200px;
            border-radius: 50%;
            background-image: url(프로필1.png);
            background-size: cover;
            float: left;
        }
        #pro:hover {
            background-image: url(프로필2.png);
        }
        #info {
            box-sizing: border-box;
            width: 300px;
            height: 200px;
            border-radius: 5%;
            border: 0px solid #ffffff00;
            float: left;
            text-align: left;
        }
        #longstick {
            width: 5px;
            height: 520px;
            border: 3px solid #eee;
            float: left;
            box-sizing: border-box;
            margin-left: 30px;
        }
        #main {
            box-sizing: border-box;
            width: 480px;
            height: 520px;
            border-radius: 5%;
            border: 0px solid #999999;
            float: right;
            padding: 20px 30px;
            text-align: left;
            background-color: #eeeeee42;
        }
        .intro {
            font-size: large;
        }
        table, tr, th, td {
            border: 1px solid #0000006b;
            border-collapse: collapse;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="pro"></div>
        <div id="info">

            <p></p>
        </div>
        <div id="longstick"></div>
        <div id="main">
